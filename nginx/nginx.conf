# =============================================================================
# Nginx reverse proxy in front of the FastAPI/Gunicorn stack.
#
# After Let's Encrypt is provisioned, drop the certs into ./nginx/ssl/
# and uncomment the HTTPS server block.
# =============================================================================

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/json application/javascript text/css text/plain;

    # Rate limit zone: 10 req/s per IP, with burst handled per-route
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    upstream mallah_api {
        server api:8000;
        keepalive 32;
    }

    # ---------- HTTP (port 80) ----------
    server {
        listen 80;
        server_name _;

        # ACME challenge for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Once HTTPS is live, replace this block with a 301 redirect to HTTPS.
        location / {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://mallah_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
            proxy_connect_timeout 5s;
        }
    }

    # ---------- HTTPS (port 443) — uncomment after certs are issued ----------
    # server {
    #     listen 443 ssl http2;
    #     server_name api.mallah.app;
    #
    #     ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
