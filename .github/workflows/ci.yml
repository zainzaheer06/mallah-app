name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: mallah
          POSTGRES_PASSWORD: mallah_dev
          POSTGRES_DB: mallah_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check app tests

      - name: Run tests
        env:
          JWT_SECRET_KEY: test_secret_key_for_ci_must_be_at_least_32_chars_long
          INGEST_API_KEY: test_ingest_key_at_least_16
          DATABASE_URL: postgresql+asyncpg://mallah:mallah_dev@localhost:5432/mallah_test
          REDIS_URL: redis://localhost:6379/0
        run: |
          pytest --cov=app --cov-report=term-missing
